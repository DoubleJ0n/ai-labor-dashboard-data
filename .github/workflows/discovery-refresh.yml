name: discovery-refresh

# Model-authored benchmark data is PROPOSED as a pull request for human
# review (audit-2026-07 finding 4 / C-3) — the same governance as
# METR/adoption/AEI. This workflow never commits to main.
on:
  schedule:
    - cron: "20 6 * * 1" # Mondays 06:20 UTC — after fred-refresh
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - id: discovery
        name: Discovery (Haiku 4.5 + web search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/discovery-refresh.mjs

      - name: Open PR for proposed benchmark points
        if: steps.discovery.outputs.status == 'changes'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          branch: discovery-update
          base: main
          title: ${{ steps.discovery.outputs.title }}
          body-path: discovery-report.md
          labels: needs-review
          add-paths: dashboard-data.json
          delete-branch: true
