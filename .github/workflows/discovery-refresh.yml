name: discovery-refresh

on:
  schedule:
    - cron: "20 6 * * 1" # Mondays 06:20 UTC — after fred-refresh
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pool-write
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Discovery (Haiku 4.5 + web search)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/discovery-refresh.mjs
      - name: Commit updated pool
        run: |
          git config user.name "pool-refresh-bot"
          git config user.email "actions@github.com"
          git add dashboard-data.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "discovery-refresh: weekly METR + benchmark check"
            git pull --rebase origin main
            git push
          fi
