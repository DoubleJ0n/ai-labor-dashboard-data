name: analysis-refresh

# The monthly Analyst (mini-economist). It reads the dashboard's panels, derives
# one of four fixed verdicts from the SAME panel state + thresholds as the
# stoplight, and writes a short plain-language read cached into the pool.
#
# CADENCE: monthly, after the BLS Employment Situation release (first Friday). The
# Phase-4 dry run + one real verdict were reviewed (AUGMENTATION_HOLDING, 2026-06),
# so the monthly schedule is now live. The old weekly workflow_run chain off
# fred/discovery is retired: the Analyst is monthly, not weekly. The in-script
# data-availability gate no-ops when the new month's release isn't in the pool yet,
# and the one-entry-per-month idempotency guard makes an extra fire on a shifted
# release date harmless.
on:
  schedule:
    - cron: "0 13 1-7 * 5"  # 13:00 UTC on the FIRST Friday of the month (post-BLS 08:30 ET)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Derive the verdict + assemble news + print the request body, make NO model call"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: pool-write
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Ensure latest pool
        run: git pull --rebase origin main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: Verify verdict derivation + registered-values parity (unit tests)
        run: node --test scripts/config.test.mjs scripts/analyst/*.test.mjs
      - name: Dry run (derive + assemble news + print request body, no model call)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: node scripts/analysis-refresh.mjs --dry-run
      - name: Analyst (Sonnet 5, monthly verdict)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/analysis-refresh.mjs
      - name: Commit updated pool + dissent log
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "pool-refresh-bot"
          git config user.email "actions@github.com"
          git add dashboard-data.json data/analyst/dissent_log.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "analyst-refresh: monthly verdict"
            git pull --rebase origin main
            git push
          fi
